<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>感測器傳輸</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f0f0f; color: #fff;
    min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    overflow-y: auto;
    padding: 24px;
  }
  /* 內容裝得下時垂直置中；裝不下時從頂部開始並可捲動，避免內容被裁掉看不到 */
  #screen-live { width: 100%; max-width: 360px; text-align: center; margin: auto 0; position: relative; }
  .hidden { display: none !important; }
  h2 { font-size: 1.4rem; margin-bottom: 8px; }
  p  { font-size: 0.9rem; color: #aaa; line-height: 1.5; }
  .btn-small {
    padding: 4px 12px; border-radius: 8px; border: none;
    font-size: 0.78rem; font-weight: 600; cursor: pointer;
    background: #2563eb; color: #fff; vertical-align: middle;
  }
  .btn-small:active { opacity: 0.8; }
  #sb-conn-text.error { color: #ef4444; }
  .status-dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    margin-right: 6px; background: #facc15;
  }
  .status-dot.green { background: #22c55e; }
  .status-dot.red   { background: #ef4444; }
  #status-bar {
    margin-top: 24px; padding: 12px 16px; border-radius: 10px;
    background: #1f1f1f; font-size: 0.85rem; text-align: left;
  }
  #status-bar div { margin: 4px 0; }
  .cube-wrap {
    perspective: 300px; width: 90px; height: 90px; margin: 28px auto;
  }
  .cube {
    width: 90px; height: 90px; position: relative;
    transform-style: preserve-3d;
    transition: transform 0.05s linear;
  }
  .face {
    position: absolute; width: 90px; height: 90px;
    border: 2px solid rgba(255,255,255,0.25);
    font-size: 0.7rem; display: flex; align-items: center; justify-content: center;
  }
  .front  { background: rgba(37,99,235,0.5);  transform: translateZ(45px); }
  .back   { background: rgba(37,99,235,0.3);  transform: rotateY(180deg) translateZ(45px); }
  .right  { background: rgba(99,102,241,0.4); transform: rotateY(90deg)  translateZ(45px); }
  .left   { background: rgba(99,102,241,0.3); transform: rotateY(-90deg) translateZ(45px); }
  .top    { background: rgba(139,92,246,0.4); transform: rotateX(90deg)  translateZ(45px); }
  .bottom { background: rgba(139,92,246,0.3); transform: rotateX(-90deg) translateZ(45px); }
  #disconnect-btn {
    margin-top: 20px; padding: 12px 0; width: 100%; border-radius: 10px; border: 1px solid #555;
    background: transparent; color: #aaa; font-size: 0.9rem; cursor: pointer;
  }
  #joystick-section { margin-top: 28px; }
  #joy-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  #joy-section-header h3 { font-size: 0.85rem; color: #555; letter-spacing: 0.05em; margin: 0; }
  #swap-btn {
    padding: 6px 14px; border-radius: 8px; border: 1px solid #444;
    background: transparent; color: #888; font-size: 0.78rem; cursor: pointer;
  }
  #swap-btn:active { opacity: 0.7; }
  #controls-row { display: flex; align-items: center; justify-content: center; gap: 24px; }
  #controls-row.swapped { flex-direction: row-reverse; }
  #grab-btn {
    width: 100px; height: 100px; border-radius: 50%;
    border: 2px solid rgba(239,68,68,0.55);
    background: radial-gradient(circle at 40% 35%, #4e1a1a, #2c0a0a 75%, #1a0505);
    color: #fff; font-size: 1rem; font-weight: 700;
    cursor: pointer; touch-action: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 0 16px rgba(239,68,68,0.18);
    transition: background 0.08s, box-shadow 0.08s, transform 0.08s;
  }
  #grab-btn.pressed {
    background: radial-gradient(circle at 40% 35%, #b33030, #751c1c 75%, #430a0a);
    box-shadow: 0 0 28px rgba(239,68,68,0.55);
    transform: scale(0.95);
  }
  #joy-base {
    position: relative; width: 220px; height: 220px; border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #0e3a4e 0%, #082030 65%, #041420 100%);
    margin: 0 auto; touch-action: none; user-select: none;
    -webkit-tap-highlight-color: transparent; cursor: pointer;
  }
  #joy-svg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    overflow: visible; pointer-events: none;
  }
  .joy-arrow { position: absolute; width: 0; height: 0; opacity: 0.65; }
  .joy-arrow-up    { top: 13px;    left: 50%; transform: translateX(-50%);
    border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 13px solid #a8dde8; }
  .joy-arrow-down  { bottom: 13px; left: 50%; transform: translateX(-50%);
    border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 13px solid #a8dde8; }
  .joy-arrow-left  { left: 13px;   top: 50%;  transform: translateY(-50%);
    border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-right: 13px solid #a8dde8; }
  .joy-arrow-right { right: 13px;  top: 50%;  transform: translateY(-50%);
    border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 13px solid #a8dde8; }
  #joy-knob {
    position: absolute; top: 50%; left: 50%;
    width: 82px; height: 82px; margin: -41px 0 0 -41px; border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #1e6080, #0c2e42 75%, #07202e);
    border: 2px solid rgba(77,217,240,0.55);
    box-shadow: 0 0 16px rgba(77,217,240,0.18);
    will-change: transform;
  }
  #joy-knob::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 50px; height: 50px; border-radius: 50%;
    border: 1px solid rgba(77,217,240,0.3);
  }
  #joy-knob.snap { transition: transform 0.14s ease-out; }
  #joy-hint { font-size: 0.72rem; color: #444; margin-top: 12px; }
  /* ── 橫直切換按鈕 ── */
  #orient-btn {
    position: fixed; top: 10px; right: 10px; z-index: 100;
    padding: 6px 14px; border-radius: 8px;
    border: 1px solid #444; background: rgba(15,15,15,0.88);
    color: #aaa; font-size: 0.78rem; cursor: pointer;
  }
  #orient-btn:active { opacity: 0.7; }
  /* ── 橫式模式 ── */
  body.landscape {
    padding: 0; align-items: stretch;
    height: 100dvh; overflow: hidden;
    --joy-size: min(220px, calc(50dvh - 10px));
    --knob-size: min(82px, calc(var(--joy-size) * 0.375));
  }
  body.landscape #screen-live {
    display: flex; flex-direction: row; max-width: 100%; width: 100%;
    height: 100dvh; padding: 0; gap: 0; align-items: stretch;
  }
  body.landscape #screen-live > h2 { display: none; }
  body.landscape .cube-wrap { display: none; }
  body.landscape #status-bar {
    position: fixed; top: env(safe-area-inset-top, 8px); left: 50%; transform: translateX(-50%);
    width: auto; white-space: nowrap; margin: 0;
    padding: 5px 16px; font-size: 0.75rem;
    display: flex; flex-direction: row; gap: 14px; text-align: center;
  }
  body.landscape #status-bar div { margin: 0; }
  body.landscape #disconnect-btn {
    position: fixed; bottom: max(env(safe-area-inset-bottom, 0px), 10px);
    right: max(env(safe-area-inset-right, 0px), 10px);
    width: auto; margin: 0; padding: 8px 18px;
  }
  body.landscape #joystick-section {
    flex: 1; margin: 0;
    display: flex; flex-direction: column; align-items: stretch;
    justify-content: flex-end;
  }
  body.landscape #joy-section-header { display: none; }
  body.landscape #joy-hint { display: none; }
  body.landscape #controls-row {
    height: 50dvh; gap: 0; align-items: stretch;
    margin-bottom: 4dvh;
  }
  body.landscape #grab-section {
    flex: 1; display: flex;
    align-items: center; justify-content: center;
  }
  body.landscape #joy-wrapper {
    flex: 1; display: flex;
    align-items: center; justify-content: center;
    padding-right: max(env(safe-area-inset-right, 0px), 2%);
  }
  /* ── 橫式自適應大小 ── */
  body.landscape #joy-base {
    width: var(--joy-size); height: var(--joy-size);
  }
  body.landscape #joy-knob {
    width: var(--knob-size); height: var(--knob-size);
    margin-top: calc(var(--knob-size) / -2);
    margin-left: calc(var(--knob-size) / -2);
    margin-bottom: 0; margin-right: 0;
  }
  body.landscape #joy-knob::after {
    width: calc(var(--knob-size) * 0.61); height: calc(var(--knob-size) * 0.61);
  }
  body.landscape #grab-btn {
    width: min(150px, calc(var(--joy-size) * 0.68));
    height: min(150px, calc(var(--joy-size) * 0.68));
    font-size: 1.1rem;
  }
  /* ── 防螢幕自動旋轉：手機旋回直式時，把橫式 UI 旋轉回來 ── */
  @media screen and (orientation: portrait) {
    body.landscape {
      position: fixed;
      min-height: 0;
      top: 0; left: 100vw;
      width: 100vh; height: 100vw;
      transform-origin: 0 0;
      transform: rotate(90deg);
      overflow: hidden;
      /* 旋轉後的 landscape 高度 = portrait 的 vw */
      --joy-size: min(220px, calc(50vw - 10px));
    }
    body.landscape #screen-live {
      height: 100%; /* 等於旋轉後的 landscape 高度 */
    }
    /* 旋轉後 vh/vw 互換：landscape 的「高度」= portrait vw */
    body.landscape #controls-row { height: 50vw; margin-bottom: 4vw; }
  }
</style>
</head>
<body>

<div id="screen-live">
  <h2><span class="status-dot green"></span>傳輸中</h2>
  <button id="orient-btn">切換直式</button>
  <div class="cube-wrap"><div class="cube" id="cube">
    <div class="face front">前</div>
    <div class="face back">後</div>
    <div class="face right">右</div>
    <div class="face left">左</div>
    <div class="face top">上</div>
    <div class="face bottom">下</div>
  </div></div>
  <div id="status-bar">
    <div id="sb-conn"><span id="sb-conn-text">準備連線到 Unity</span> <button id="btn-start" class="btn-small">開始傳送</button></div>
    <div id="sb-mode">模式：-</div>
    <div id="sb-hz">頻率：-</div>
    <div id="sb-pkts">封包：0</div>
  </div>
  <button id="disconnect-btn">中斷連線</button>

  <div id="joystick-section">
    <div id="joy-section-header">
      <h3>模擬搖桿</h3>
      <button id="swap-btn">⇄ 左右對調</button>
    </div>
    <div id="controls-row">
      <div id="grab-section"><button id="grab-btn">抓取</button></div>
      <div id="joy-wrapper"><div id="joy-base">
      <svg id="joy-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
        <!-- 外圈分段裝飾弧 -->
        <circle cx="110" cy="110" r="105" fill="none" stroke="#4dd9f0" stroke-width="3.5"
                stroke-dasharray="118 47" stroke-dashoffset="-22" stroke-linecap="round"/>
        <!-- 內圈 -->
        <circle cx="110" cy="110" r="72" fill="none" stroke="rgba(77,217,240,0.18)" stroke-width="1"/>
      </svg>
      <div class="joy-arrow joy-arrow-up"></div>
      <div class="joy-arrow joy-arrow-down"></div>
      <div class="joy-arrow joy-arrow-left"></div>
      <div class="joy-arrow joy-arrow-right"></div>
      <div id="joy-knob"></div>
    </div></div><!-- end joy-base / joy-wrapper -->
    </div><!-- end controls-row -->
    <p id="joy-hint">拖曳搖桿移動　鍵盤 WASD / 方向鍵</p>
  </div>
</div>

<script>
const SIGNAL_URL = (() => {
  const p = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${p}//${window.location.host}`;
})();

const params   = new URLSearchParams(window.location.search);
const ROOM     = params.get('room') || 'DEFAULT';

let ws = null, pc = null, dc = null;
let orientData = { alpha: 0, beta: 0, gamma: 0 };
let accelData  = { x: 0, y: 0, z: 0 };
let pktCount   = 0, hzCount = 0, lastHzTime = Date.now();

// ── 橫直模式 ──────────────────────────────────────────────
let isLandscape = true; // 預設橫式（右側朝下）
document.body.classList.toggle('landscape', isLandscape);

// ── iOS 權限按鈕 ──────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', async () => {
  const sbConnText = document.getElementById('sb-conn-text');
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const r1 = await DeviceOrientationEvent.requestPermission();
      const r2 = await DeviceMotionEvent.requestPermission();
      if (r1 !== 'granted' || r2 !== 'granted') {
        sbConnText.textContent = '請允許感測器權限';
        sbConnText.classList.add('error');
        return;
      }
    } catch(e) {
      sbConnText.textContent = '權限請求失敗：' + e.message;
      sbConnText.classList.add('error');
      return;
    }
  }
  sbConnText.classList.remove('error');
  document.getElementById('btn-start').classList.add('hidden');
  startSensors();
  connectSignaling();
});

// ── 感測器監聽 ────────────────────────────────────────────
function startSensors() {
  window.addEventListener('deviceorientation', e => {
    orientData = { alpha: e.alpha || 0, beta: e.beta || 0, gamma: e.gamma || 0 };
    if (dc && dc.readyState === 'open') sendPacket();
  });
  window.addEventListener('devicemotion', e => {
    const a = e.accelerationIncludingGravity;
    if (a) accelData = { x: a.x || 0, y: a.y || 0, z: a.z || 0 };
  });
}

// ── Euler(ZXY) → Quaternion ──────────────────────────────
function eulerToQuat(alpha, beta, gamma) {
  const a = alpha * Math.PI / 180;
  const b = beta  * Math.PI / 180;
  const g = gamma * Math.PI / 180;
  const ca = Math.cos(a/2), sa = Math.sin(a/2);
  const cb = Math.cos(b/2), sb = Math.sin(b/2);
  const cg = Math.cos(g/2), sg = Math.sin(g/2);
  return {
    w: ca*cb*cg - sa*sb*sg,
    x: ca*sb*cg - sa*cb*sg,
    y: ca*cb*sg + sa*sb*cg,
    z: sa*cb*cg + ca*sb*sg
  };
}

// ── 封包打包（28 bytes Big-Endian）──────────────────────
function sendPacket() {
  // 右橫（右側朝下）時補正陀螺儀軸：beta_eff = -gamma, gamma_eff = beta
  const effBeta  = isLandscape ? -orientData.gamma : orientData.beta;
  const effGamma = isLandscape ?  orientData.beta  : orientData.gamma;
  const q = eulerToQuat(orientData.alpha, effBeta, effGamma);
  const buf  = new ArrayBuffer(28);
  const view = new DataView(buf);
  view.setFloat32(0,  q.x,        false);
  view.setFloat32(4,  q.y,        false);
  view.setFloat32(8,  q.z,        false);
  view.setFloat32(12, q.w,        false);
  view.setFloat32(16, accelData.x, false);
  view.setFloat32(20, accelData.y, false);
  view.setFloat32(24, accelData.z, false);
  dc.send(buf);
  pktCount++; hzCount++;

  // 方塊姿態預覽
  const c = document.getElementById('cube');
  if (c) c.style.transform =
    `rotateZ(${-orientData.alpha}deg) rotateX(${orientData.beta}deg) rotateY(${orientData.gamma}deg)`;
}

// ── 模擬搖桿 ──────────────────────────────────────────────
let joyH = 0, joyV = 0;
let joyDragging  = false;
let joyTouchId   = null; // 追蹤搖桿專屬的手指 ID
let joyInterval  = null;
let JOY_MAX      = 62; // knob 最大位移 px，會在 updateJoyMax() 動態更新

const joyBase = document.getElementById('joy-base');
const joyKnob = document.getElementById('joy-knob');

function updateJoyMax() {
  const r = joyBase.getBoundingClientRect();
  const k = joyKnob.getBoundingClientRect();
  if (r.width > 0 && k.width > 0) JOY_MAX = Math.round((r.width / 2) - (k.width / 2) - 8);
}

async function tryLockOrientation(type) {
  try {
    if (screen.orientation && typeof screen.orientation.lock === 'function')
      await screen.orientation.lock(type);
  } catch(_) {}
}
function unlockOrientation() {
  try { if (screen.orientation?.unlock) screen.orientation.unlock(); } catch(_) {}
}

function joyMove(clientX, clientY) {
  const r  = joyBase.getBoundingClientRect();
  let dx   = clientX - (r.left + r.width  / 2);
  let dy   = clientY - (r.top  + r.height / 2);
  const d  = Math.hypot(dx, dy);
  if (d > JOY_MAX) { dx = dx / d * JOY_MAX; dy = dy / d * JOY_MAX; }
  joyKnob.style.transform = `translate(${dx}px,${dy}px)`;
  joyH =  dx / JOY_MAX;
  joyV = -dy / JOY_MAX; // 螢幕 Y 向下，遊戲前進向上，故取反
}

function joyReset() {
  joyKnob.classList.add('snap');
  joyKnob.style.transform = '';
  joyH = 0; joyV = 0; joyDragging = false; joyTouchId = null;
  setTimeout(() => joyKnob.classList.remove('snap'), 160);
}

// 觸控（用 identifier 追蹤搖桿那根手指，避免多點觸控干擾）
joyBase.addEventListener('touchstart', e => {
  e.preventDefault();
  if (joyTouchId !== null) return; // 已在追蹤，忽略額外的手指
  const t = e.changedTouches[0];
  joyTouchId = t.identifier;
  joyDragging = true;
  joyMove(t.clientX, t.clientY);
}, { passive: false });

joyBase.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!joyDragging) return;
  const t = Array.from(e.touches).find(t => t.identifier === joyTouchId);
  if (t) joyMove(t.clientX, t.clientY);
}, { passive: false });

joyBase.addEventListener('touchend', e => {
  e.preventDefault();
  if (Array.from(e.changedTouches).some(t => t.identifier === joyTouchId)) joyReset();
}, { passive: false });

joyBase.addEventListener('touchcancel', e => {
  e.preventDefault();
  if (Array.from(e.changedTouches).some(t => t.identifier === joyTouchId)) joyReset();
}, { passive: false });

// 滑鼠（桌機測試）
joyBase.addEventListener('mousedown', e => { joyDragging = true; joyMove(e.clientX, e.clientY); });
document.addEventListener('mousemove', e => { if (joyDragging) joyMove(e.clientX, e.clientY); });
document.addEventListener('mouseup',   () => { if (joyDragging) joyReset(); });

// 鍵盤（WASD / 方向鍵）
const KEY_MAP   = { ArrowUp:'u',w:'u',W:'u', ArrowDown:'d',s:'d',S:'d', ArrowLeft:'l',a:'l',A:'l', ArrowRight:'r',d:'r',D:'r' };
const keyHeld   = new Set();
function applyKeys() {
  if (joyDragging) return;
  const h = (keyHeld.has('r')?1:0) - (keyHeld.has('l')?1:0);
  const v = (keyHeld.has('u')?1:0) - (keyHeld.has('d')?1:0);
  joyH = h; joyV = v;
  joyKnob.classList.remove('snap');
  joyKnob.style.transform = (h||v) ? `translate(${h*JOY_MAX}px,${-v*JOY_MAX}px)` : '';
}
document.addEventListener('keydown', e => { const k=KEY_MAP[e.key]; if(k){ keyHeld.add(k);    applyKeys(); e.preventDefault(); } });
document.addEventListener('keyup',   e => { const k=KEY_MAP[e.key]; if(k){ keyHeld.delete(k); applyKeys(); } });

function sendJoystick() {
  if (!dc || dc.readyState !== 'open') return;
  const buf  = new ArrayBuffer(9);
  const view = new DataView(buf);
  view.setUint8(0, 0x02);
  view.setFloat32(1, joyH, false);
  view.setFloat32(5, joyV, false);
  dc.send(buf);
}

// ── 抓取按鈕 ─────────────────────────────────────────────
const grabBtn = document.getElementById('grab-btn');

function sendGrab(pressed) {
  if (!dc || dc.readyState !== 'open') return;
  dc.send(new Uint8Array([pressed ? 0x03 : 0x04]).buffer);
}

grabBtn.addEventListener('touchstart',  e => { e.preventDefault(); grabBtn.classList.add('pressed');    sendGrab(true);  }, { passive: false });
grabBtn.addEventListener('touchend',    e => { e.preventDefault(); grabBtn.classList.remove('pressed'); sendGrab(false); }, { passive: false });
grabBtn.addEventListener('touchcancel', e => { e.preventDefault(); grabBtn.classList.remove('pressed'); sendGrab(false); }, { passive: false });
grabBtn.addEventListener('mousedown', () => { grabBtn.classList.add('pressed');    sendGrab(true);  });
document.addEventListener('mouseup',  () => { if (grabBtn.classList.contains('pressed')) { grabBtn.classList.remove('pressed'); sendGrab(false); } });

// ── 左右對調 ──────────────────────────────────────────────
let swapped = false;
document.getElementById('swap-btn').addEventListener('click', () => {
  swapped = !swapped;
  document.getElementById('controls-row').classList.toggle('swapped', swapped);
  document.getElementById('swap-btn').textContent = swapped ? '⇄ 還原位置' : '⇄ 左右對調';
});

// ── Hz 計算 ───────────────────────────────────────────────
setInterval(() => {
  const now = Date.now();
  const hz  = Math.round(hzCount * 1000 / (now - lastHzTime));
  document.getElementById('sb-hz').textContent  = `頻率：${hz} Hz`;
  document.getElementById('sb-pkts').textContent = `封包：${pktCount}`;
  hzCount = 0; lastHzTime = now;
}, 1000);

// ── Signaling WebSocket ───────────────────────────────────
function connectSignaling() {
  setConn('正在連接 Signaling Server…');
  ws = new WebSocket(SIGNAL_URL);

  ws.onopen = () => {
    setConn('已連上 Server，等待 Unity…');
    ws.send(JSON.stringify({ type: 'join', room: ROOM, role: 'guest' }));
  };

  ws.onmessage = async e => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'ready') {
      setConn('Unity 已就緒，建立 WebRTC…');
      // 等 Unity 送 offer
    }
    else if (msg.type === 'offer') {
      setConn('收到 Offer，協商中…');
      await pc.setRemoteDescription({ type: 'offer', sdp: msg.sdp });
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      ws.send(JSON.stringify({ type: 'answer', room: ROOM, sdp: answer.sdp }));
    }
    else if (msg.type === 'candidate' && msg.candidate) {
      try { await pc.addIceCandidate(msg.candidate); } catch(_) {}
    }
  };

  ws.onerror = () => setConn('Server 連線錯誤，請重新整理');
  ws.onclose = () => { if (dc?.readyState !== 'open') setConn('Server 已斷線'); };

  setupPeerConnection();
}

// ── WebRTC PeerConnection ─────────────────────────────────
function setupPeerConnection() {
  pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
  });

  pc.onicecandidate = e => {
    if (e.candidate) {
      ws.send(JSON.stringify({ type: 'candidate', room: ROOM, candidate: e.candidate }));
    }
  };

  pc.ondatachannel = e => {
    dc = e.channel;
    dc.onopen  = () => {
      document.getElementById('sb-mode').textContent = '模式：WebRTC P2P';
      document.getElementById('sb-conn').classList.add('hidden');
      tryWakeLock();
      tryLockOrientation(isLandscape ? 'landscape-primary' : 'portrait-primary');
      requestAnimationFrame(updateJoyMax); // CSS 渲染完後再取尺寸
      joyInterval = setInterval(sendJoystick, 50); // 20 Hz
    };
    dc.onclose = () => {
      clearInterval(joyInterval); joyInterval = null;
      joyReset();
      resetConn();
    };
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed') setConn('WebRTC 連線失敗，請重新整理');
  };
}

// ── Wake Lock（保持螢幕亮）────────────────────────────────
async function tryWakeLock() {
  try {
    if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
  } catch(_) {}
}

// ── 中斷連線 ──────────────────────────────────────────────
document.getElementById('disconnect-btn').addEventListener('click', () => {
  clearInterval(joyInterval); joyInterval = null;
  joyReset(); keyHeld.clear();
  dc?.close(); pc?.close(); ws?.close();
  dc = pc = ws = null;
  unlockOrientation();
  resetConn();
});

// ── 橫直切換 ──────────────────────────────────────────────
document.getElementById('orient-btn').addEventListener('click', () => {
  isLandscape = !isLandscape;
  document.body.classList.toggle('landscape', isLandscape);
  document.getElementById('orient-btn').textContent = isLandscape ? '切換直式' : '切換橫式';
  tryLockOrientation(isLandscape ? 'landscape-primary' : 'portrait-primary');
  requestAnimationFrame(updateJoyMax);
});

// 輔助
function setConn(msg) { document.getElementById('sb-conn-text').textContent = msg; }

function resetConn() {
  document.getElementById('sb-conn').classList.remove('hidden');
  document.getElementById('sb-conn-text').textContent = '準備連線到 Unity';
  document.getElementById('sb-conn-text').classList.remove('error');
  document.getElementById('btn-start').classList.remove('hidden');
  document.getElementById('sb-mode').textContent = '模式：-';
}

// 畫面一開始就顯示操作頁，先量好搖桿尺寸
requestAnimationFrame(updateJoyMax);
</script>
